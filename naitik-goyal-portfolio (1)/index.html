
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naitik Goyal | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #06211d;
            --brand-yellow: #f5f142;
            --accent-green: #0a3d35;
        }
        
        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            position: relative;
            /* Stabilization for 3D transforms */
            backface-visibility: hidden;
        }

        /* Premium Grain Texture Overlay - Optimized */
        .bg-grain::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Cfilter id='noiseFilter'%3%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3%3C/filter%3%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3%3C/svg%3E");
            will-change: transform;
        }

        .font-syncopate { font-family: 'Syncopate', sans-serif; }
        
        .text-outline {
            -webkit-text-stroke: 1px white;
            color: transparent;
        }
        
        .text-outline-yellow {
            -webkit-text-stroke: 1px var(--brand-yellow);
            color: transparent;
        }

        .dashed-border {
            border-style: dashed;
        }

        .ticket-cut {
            position: relative;
            transform: translateZ(0); /* Hardware acceleration */
        }

        .ticket-cut::before, .ticket-cut::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: var(--bg-dark);
            border-radius: 50%;
            z-index: 10;
        }
        .ticket-cut-side::before { left: -10px; top: 50%; transform: translateY(-50%); }
        .ticket-cut-side::after { right: -10px; top: 50%; transform: translateY(-50%); }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--brand-yellow); border-radius: 4px; }

        @keyframes scan {
            0% { transform: translate3d(-100%, 0, 0); }
            100% { transform: translate3d(100%, 0, 0); }
        }
        .animate-scan {
            animation: scan 3s linear infinite;
            will-change: transform;
        }

        .gpu-accel {
            transform: translateZ(0);
            backface-visibility: hidden;
            perspective: 1000px;
        }

        .will-change-transform {
            will-change: transform;
        }

        .will-change-opacity {
            will-change: opacity;
        }

        /* Prevent layout thrashing on list elements */
        .no-flicker {
            -webkit-transform-style: preserve-3d;
            transform-style: preserve-3d;
        }
    </style>
<script type="importmap">
{

  }
}
</script>

</head>
